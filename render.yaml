services:
  # Backend API Service
  - type: web
    name: vajraa-backend
    env: python
    buildCommand: "cd backend && ./build.sh"
    startCommand: "cd backend && gunicorn backend_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vajraa-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: vajraa-backend.onrender.com,localhost,127.0.0.1
      - key: PYTHONPATH
        value: /opt/render/project/src/backend

  # Frontend Service
  - type: web
    name: vajraa-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_URL
        value: https://vajraa-backend.onrender.com/api

  # Database Service
  - type: database
    name: vajraa-db
    databaseType: postgresql
    plan: free
    ipAllowList: []  # only accessible by other services